<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Status</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="sidebar" class="sidebar">
    <a href="javascript:void(0)" class="closebtn" onclick="closeNav()">&times;</a>
    <a href="homepage.html">Home</a>
    <a href="report.html">Report Item</a>
    <a href="search.html">Search Items</a>
    <a href="status.html">Status</a>
  </div>

  <div class="topbar">
    <span style="font-size:30px;cursor:pointer" onclick="openNav()">&#9776;</span>
    <h1>Status</h1>
  </div>

  <div class="status-container" id="statusContainer"></div>

  <script>
    function openNav() { document.getElementById("sidebar").style.width = "250px"; }
    function closeNav() { document.getElementById("sidebar").style.width = "0"; }

    const statusDiv = document.getElementById('statusContainer');
    const reports = JSON.parse(localStorage.getItem('reports') || '[]');

    if(reports.length === 0) {
      statusDiv.textContent = "You have not submitted or requested any items yet.";
    } else {
      reports.forEach((r, idx) => {
        const div = document.createElement('div');
        div.className = 'status-item';
        div.innerHTML = `<p><strong>${r.desc}</strong> - Status: ${r.status}</p>`;
        statusDiv.appendChild(div);
      });
    }
  </script>
</body>
</html>
